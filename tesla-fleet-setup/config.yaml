name: "Tesla Fleet Setup"
description: "Guided setup wizard for Tesla Fleet API integration with Home Assistant"
version: "0.1.8"
slug: tesla-fleet-setup
url: "https://github.com/ds2000/ha-tesla-fleet-setup"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
init: false
homeassistant_api: true
